type Movie {
  id: String!
  title: String!
  description: String!
}

type TVShow {
  id: String!
  title: String!
  description: String!
}

type DeleteResult {
  success: Boolean!
}

type Query {
  movie(id: String!): Movie
  movies: [Movie]
  tvShow(id: String!): TVShow
  tvShows: [TVShow]
}

type Mutation {
  createMovie(title: String!, description: String!): Movie
  updateMovie(id: String!, title: String!, description: String!): Movie
  deleteMovie(id: String!): DeleteResult

  createTVShow(title: String!, description: String!): TVShow
  updateTVShow(id: String!, title: String!, description: String!): TVShow
  deleteTVShow(id: String!): DeleteResult
}